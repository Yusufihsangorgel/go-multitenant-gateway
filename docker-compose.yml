# Local backends for the production wiring and the integration tests.
# The gateway itself still runs on the host: see "Run it with Postgres and
# Redis" in the README.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gateway
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
